<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'; img-src 'none'; object-src 'none'; base-uri 'none'"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Repostify update</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
        background: #0a0a0b;
        color: #f7f7f8;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background: #0a0a0b;
      }
      button { font: inherit; }
      .titlebar {
        height: 42px;
        display: flex;
        align-items: center;
        padding: 0 138px 0 18px;
        color: #a9a9b1;
        font-size: 12px;
        font-weight: 500;
        border-bottom: 1px solid #202024;
        -webkit-app-region: drag;
        user-select: none;
      }
      main {
        min-height: calc(100vh - 42px);
        padding: 30px 34px 28px;
        display: flex;
        flex-direction: column;
      }
      .identity {
        display: flex;
        align-items: center;
        gap: 13px;
      }
      .mark {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        position: relative;
        border-radius: 12px;
        background: #141416;
        color: #fff;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 31px;
        font-style: italic;
        line-height: 1;
      }
      .mark::after {
        content: "";
        position: absolute;
        right: 8px;
        bottom: 8px;
        width: 6px;
        height: 6px;
        background: #25f4ee;
      }
      .identity-copy { min-width: 0; }
      .product {
        color: #f7f7f8;
        font-size: 14px;
        font-weight: 650;
      }
      .meta {
        margin-top: 3px;
        color: #9d9da5;
        font-size: 12px;
      }
      h1 {
        margin: 27px 0 8px;
        max-width: 20ch;
        font-size: 25px;
        line-height: 1.16;
        letter-spacing: -0.025em;
        text-wrap: balance;
      }
      .description {
        min-height: 42px;
        margin: 0;
        max-width: 54ch;
        color: #b6b6bd;
        font-size: 14px;
        line-height: 1.5;
        text-wrap: pretty;
      }
      .version-row {
        margin-top: 22px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #98989f;
        font: 500 13px/1 ui-monospace, "Cascadia Mono", Consolas, monospace;
      }
      .version-row strong {
        padding: 8px 10px;
        border-radius: 8px;
        background: #151517;
        color: #d8d8dc;
        font-weight: 600;
      }
      .version-row strong:last-child { color: #25f4ee; }
      .progress-wrap {
        display: none;
        margin-top: 25px;
      }
      .progress-labels {
        display: flex;
        justify-content: space-between;
        margin-bottom: 9px;
        color: #a8a8af;
        font-size: 12px;
      }
      .progress {
        --progress: 0;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: #242428;
      }
      .progress::after {
        content: "";
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: #25f4ee;
        transform: scaleX(var(--progress));
        transform-origin: left center;
        transition: transform 180ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .error {
        display: none;
        margin-top: 18px;
        padding: 11px 12px;
        border-radius: 9px;
        background: #251518;
        color: #ffb2c1;
        font: 12px/1.45 ui-monospace, "Cascadia Mono", Consolas, monospace;
        overflow-wrap: anywhere;
      }
      .actions {
        margin-top: auto;
        display: flex;
        justify-content: flex-end;
        gap: 9px;
      }
      .button {
        min-width: 104px;
        height: 42px;
        padding: 0 17px;
        border-radius: 10px;
        border: 0;
        font-size: 13px;
        font-weight: 650;
        cursor: pointer;
        transition: background-color 160ms ease, color 160ms ease, transform 100ms ease;
      }
      .button:active { transform: translateY(1px); }
      .button:focus-visible {
        outline: 2px solid #25f4ee;
        outline-offset: 2px;
      }
      .button-secondary {
        background: #1a1a1d;
        color: #d3d3d8;
      }
      .button-secondary:hover { background: #242428; }
      .button-primary {
        background: #f7f7f8;
        color: #0a0a0b;
      }
      .button-primary:hover { background: #25f4ee; }
      [data-state="downloading"] .version-row,
      [data-state="verifying"] .version-row,
      [data-state="installing"] .version-row,
      [data-state="error"] .version-row { display: none; }
      [data-state="downloading"] .progress-wrap,
      [data-state="verifying"] .progress-wrap { display: block; }
      [data-state="downloading"] .actions,
      [data-state="verifying"] .actions,
      [data-state="installing"] .actions { visibility: hidden; }
      [data-state="error"] .error { display: block; }
      [data-state="error"] [data-action="update"]::after { content: "Try again"; }
      [data-state="error"] [data-action="update"] { font-size: 0; }
      [data-state="error"] [data-action="update"]::after { font-size: 13px; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body data-state="available">
    <div class="titlebar">Repostify</div>
    <main>
      <div class="identity">
        <div class="mark" aria-hidden="true">R</div>
        <div class="identity-copy">
          <div class="product">Application update</div>
          <div class="meta" data-update-meta>Windows x64</div>
        </div>
      </div>

      <h1 data-title>A new version is ready</h1>
      <p class="description" data-description>
        Repostify will download the verified Windows build, install it, and reopen automatically.
      </p>

      <div class="version-row" aria-label="Version change">
        <strong data-current-version>current</strong>
        <span aria-hidden="true">→</span>
        <strong data-latest-version>latest</strong>
      </div>

      <div class="progress-wrap" aria-live="polite">
        <div class="progress-labels">
          <span data-progress-bytes>Starting download</span>
          <span data-progress-text>0%</span>
        </div>
        <div
          class="progress"
          data-progress
          role="progressbar"
          aria-label="Update download"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        ></div>
      </div>

      <div class="error" data-error role="alert"></div>

      <div class="actions" data-actions>
        <button class="button button-secondary" type="button" data-action="later">Not now</button>
        <button class="button button-primary" type="button" data-action="update">Update now</button>
      </div>
    </main>
    <script src="update-renderer.js"></script>
  </body>
</html>
